name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        type: choice
        description: Release Version
        required: true
        default: next
        options:
          - latest
          - next
      branch:
        description: Release Branch (confirm release branch)
        required: true
        default: main

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Publish
    steps:
      - name: Validate manual publish target
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_BRANCH: ${{ github.event.inputs.branch }}
        run: |
          if [ "$RELEASE_BRANCH" != "main" ]; then
            echo "Releases must publish from main."
            echo "Got: $RELEASE_BRANCH"
            exit 1
          fi

      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.event.inputs.branch }}

      - name: Verify source is on main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Release source must be reachable from main."
            echo "Got: $(git rev-parse HEAD)"
            exit 1
          fi

      - name: Cache tool downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache
          key: ${{ runner.os }}-toolcache-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-toolcache-

      - name: Setup pnpm
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate preview version
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version == 'next'
        run: |
          pnpm changeset version --snapshot next
          SNAPSHOT_VERSION="$(node -p "require('./packages/nuxt/package.json').version")"
          BASE_VERSION="${SNAPSHOT_VERSION%%-*}"
          NEXT_VERSION="${BASE_VERSION}-next.${GITHUB_RUN_ID}"
          npm pkg set version="$NEXT_VERSION" --prefix packages/nuxt
          echo "Set preview version: $NEXT_VERSION"

      - name: Verify tag matches package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          TAG="$RELEASE_TAG"
          if [ "${TAG#v}" != "$TAG" ]; then
            echo "Invalid tag format; refusing to publish."
            echo "Expected: 1.2.3 (no leading 'v')"
            echo "Got: $TAG"
            exit 1
          fi

          VERSION_FROM_TAG="$TAG"
          PKG_VERSION="$(node -p "require('./packages/nuxt/package.json').version")"

          if [ "$PKG_VERSION" != "$VERSION_FROM_TAG" ]; then
            echo "Version mismatch; refusing to publish."
            echo "Git tag: $TAG"
            echo "packages/nuxt/package.json version: $PKG_VERSION"
            exit 1
          fi

      - name: Set deterministic prerelease version
        if: github.event_name == 'release' && github.event.release.prerelease
        shell: bash
        run: |
          CURRENT_VERSION="$(node -p "require('./packages/nuxt/package.json').version")"
          BASE_VERSION="${CURRENT_VERSION%%-*}"
          NEXT_VERSION="${BASE_VERSION}-next.${GITHUB_RUN_ID}"
          npm pkg set version="$NEXT_VERSION" --prefix packages/nuxt
          echo "Set prerelease version: $NEXT_VERSION"

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build package and examples
        run: pnpm build

      - name: Test package and production examples
        run: pnpm test

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Test browser hydration
        run: pnpm test:e2e

      - name: Check formatting
        run: pnpm format:check

      - name: Verify published package contents
        run: pnpm pack:nuxt

      - name: Compute npm dist-tag
        id: dist
        shell: bash
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease || false }}
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          DIST_TAG="latest"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "$RELEASE_VERSION" = "next" ]; then
              DIST_TAG="next"
            fi
          else
            if [ "$IS_PRERELEASE" = "true" ]; then
              DIST_TAG="next"
            fi
          fi

          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"

      - name: Resolve publish action
        id: publish_action
        shell: bash
        run: |
          PACKAGE_NAME="@module-federation/nuxt"
          PKG_VERSION="$(node -p "require('./packages/nuxt/package.json').version")"
          DIST_TAG="${{ steps.dist.outputs.dist_tag }}"
          ACTION="publish"
          REASON="new version not yet on npm"

          EXISTING_VERSION="$(npm view "$PACKAGE_NAME@$PKG_VERSION" version --json 2>/dev/null || true)"
          EXISTING_VERSION="${EXISTING_VERSION#\"}"
          EXISTING_VERSION="${EXISTING_VERSION%\"}"

          if [ "$EXISTING_VERSION" = "$PKG_VERSION" ]; then
            CURRENT_TAG_VERSION="$(npm view "$PACKAGE_NAME" "dist-tags.$DIST_TAG" --json 2>/dev/null || true)"
            CURRENT_TAG_VERSION="${CURRENT_TAG_VERSION#\"}"
            CURRENT_TAG_VERSION="${CURRENT_TAG_VERSION%\"}"
            if [ "$CURRENT_TAG_VERSION" = "null" ]; then
              CURRENT_TAG_VERSION=""
            fi

            if [ "$CURRENT_TAG_VERSION" = "$PKG_VERSION" ]; then
              ACTION="skip"
              REASON="version already published and dist-tag already points to it"
            else
              echo "Refusing to republish existing npm version:"
              echo "Package: $PACKAGE_NAME"
              echo "Version: $PKG_VERSION"
              echo "Target dist-tag: $DIST_TAG"
              echo "Current '$DIST_TAG' dist-tag points to: ${CURRENT_TAG_VERSION:-<unset>}"
              echo ""
              echo "Trusted Publishers do not support dist-tag promotion without publishing."
              echo "Use a new semver version for this release flow."
              exit 1
            fi
          fi

          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.publish_action.outputs.action == 'publish'
        working-directory: packages/nuxt
        run: npm publish --provenance --tag "${{ steps.dist.outputs.dist_tag }}" --access public

      - name: Skip npm publish
        if: steps.publish_action.outputs.action == 'skip'
        run: |
          echo "Skipping npm publish:"
          echo "${{ steps.publish_action.outputs.reason }}"

      - name: Post summary
        if: always()
        continue-on-error: true
        env:
          SOURCE_REF: ${{ github.event.release.tag_name || github.event.inputs.branch }}
        run: |
          PKG_VERSION="$(node -p "require('./packages/nuxt/package.json').version")"
          echo "## npm publish" > "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Package: \`@module-federation/nuxt\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: \`$PKG_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Dist-tag: \`${{ steps.dist.outputs.dist_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Action: \`${{ steps.publish_action.outputs.action || 'unknown' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Reason: \`${{ steps.publish_action.outputs.reason || 'n/a' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Trigger: \`${{ github.event_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Source ref: \`$SOURCE_REF\`" >> "$GITHUB_STEP_SUMMARY"
